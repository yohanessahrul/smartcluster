name: Vercel Auto Redeploy (master)

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: vercel-redeploy-master
  cancel-in-progress: true

jobs:
  redeploy-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Redeploy to Vercel Production
        run: ./scripts/redeploy-vercel.sh
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
